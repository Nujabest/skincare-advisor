name: Tests Mistral

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [main]

jobs:
  test-mistral:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r Mistral/requirements.txt
          pip install pytest ruff

      - name: 🧹 Run Ruff (lint) on Mistral
        run: |
          ruff check Mistral --exclude "planning.ipynb"

      - name: 🧪 Run Pytest on Mistral
        run: |
          pytest Mistral/tests --maxfail=1 --disable-warnings -q
