name: Tests & Lint

on:
  push:
    branches:
      - dev
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ⚠️ Plus d'installation requirements.txt racine
      # On installe DIRECTEMENT Mistral + Ollama

      - name: 📦 Install Mistral dependencies
        run: |
          pip install -r Mistral/requirements.txt
          pip install pytest ruff

      - name: 📦 Install Ollama dependencies
        run: |
          pip install -r Ollama/requirements.txt

      - name: 🧹 Run Ruff (lint)
        run: |
          ruff check . --exclude "planning.ipynb"

      - name: 🧪 Run Pytest on Mistral
        run: |
          pytest Mistral/tests --maxfail=1 --disable-warnings -q

      - name: 🧪 Run Pytest on Ollama
        run: |
          pytest Ollama/tests --maxfail=1 --disable-warnings -q
