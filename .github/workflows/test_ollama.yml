name: Tests Ollama

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [main]

jobs:
  test-ollama:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r Ollama/requirements.txt
          pip install pytest ruff

      - name: 🧹 Run Ruff (lint) on Ollama
        run: |
          ruff check Ollama --exclude "planning.ipynb"

      - name: 🧪 Run Pytest on Ollama
        run: |
          pytest Ollama/tests --maxfail=1 --disable-warnings -q
